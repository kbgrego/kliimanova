<section class="page-shell">
  <main class="hero">
    <div class="hero-card">
      <h1>{{ t('hero.title') }}</h1>
      <h1><span class="headline-gradient">{{ t('hero.titleHighlight') }}</span></h1>
      <p class="hero-subtitle">
        {{ t('hero.subtitle') }}
      </p>
      <div class="service-list" aria-label="Our services">
        <span class="service-pill">
          <img class="service-icon" src="/ac.png" alt="Cooling icon" />
          <span class="service-pill-text">{{ t('hero.services.cooling') }}</span>
        </span>
        <span class="service-pill">
          <img class="service-icon" src="/fire.png" alt="Heating icon" />
          <span class="service-pill-text">{{ t('hero.services.heating') }}</span>
        </span>
        <span class="service-pill">
          <img class="service-icon" src="/system-heat.png" alt="Heat Pumps icon" />
          <span class="service-pill-text">{{ t('hero.services.heatPumps') }}</span>
        </span>
      </div>
      <div class="cta-group" role="group" aria-label="Primary actions">
        <a class="cta" href="/request">
          <span>{{ t('hero.cta.consultation') }}</span>
          <span class="cta-arrow" aria-hidden="true">→</span>
        </a>
        <a class="cta secondary" href="/projects">
          <span>{{ t('hero.cta.projects') }}</span>
          <span class="cta-arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </div>
  </main>
</section>
